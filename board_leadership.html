<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styrelseledning – BRF Sjötungan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        :root {
            --vm-blue: #1f3f95;
            --vm-blue-light: #7daef2;
            --vm-card: #e8edf6;
            --vm-text: #2f3d52;
            --vm-muted: #5e6b80;
            --vm-border: #c9d6ec;
        }

        body {
            font-size: 1rem;
            background: #f0f4fa;
            color: var(--vm-text);
        }

        @media (max-width: 640px) {
            body { font-size: 0.875rem; }
            h1 { font-size: 1.5rem !important; }
        }

        h1 { font-size: 2.25rem; }

        .board-table {
            width: 100%;
            border-collapse: collapse;
            background: #f7f9fd;
            border: 1px solid var(--vm-border);
            border-radius: 10px;
            overflow: hidden;
        }

        .board-table thead {
            background: #eef3fb;
        }

        .board-table tr:hover {
            background: #eef3fb;
        }

        .board-table th,
        .board-table td {
            padding: 15px;
            border-bottom: 1px solid #dde6f4;
            color: var(--vm-text);
            font-size: 14px;
        }

        .board-table th {
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: #33486f;
            border-bottom: 2px solid var(--vm-border);
        }

        .highlight-change {
            background: #fffbe6;
        }

        .clickable-value {
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: underline;
            text-decoration-style: dotted;
        }

        .clickable-value:hover {
            color: var(--vm-blue);
            text-decoration-style: solid;
        }

        /* ── Modal ─────────────────────────────────────── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: white;
            margin: 2% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 1200px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .modal-header h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 20px;
        }

        .close {
            color: #aaa;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
        }

        .close:hover,
        .close:focus {
            color: #000;
        }

        .pdf-viewer {
            text-align: center;
            margin-top: 20px;
        }

        .pdf-controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .pdf-controls button {
            background: var(--vm-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .pdf-controls button:hover {
            background: #2c54bf;
        }

        .pdf-controls button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .pdf-controls span {
            font-size: 14px;
            color: #666;
        }

        #pdf-canvas {
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-3xl mx-auto px-4 py-10">
        <h1 class="font-bold mb-2" style="color: var(--vm-blue);">Styrelseledning</h1>
        <p class="mb-4" style="color: var(--vm-muted);">Klicka på ett värde för att visa källan i PDF.</p>

        <div id="column-filters" class="mb-6 flex flex-wrap gap-4"></div>

        <table class="board-table" id="board-table">
            <thead>
                <tr id="board-head-row"></tr>
            </thead>
            <tbody id="board-body"></tbody>
        </table>
    </div>

    <section class="max-w-3xl mx-auto mt-10 mb-4 px-4">
        <h2 class="text-lg font-semibold mb-3" style="color: var(--vm-muted);">Källdokument (PDF)</h2>
        <ul id="pdf-source-list" class="space-y-1 text-sm" style="color: var(--vm-muted);"></ul>
    </section>

    <!-- PDF Modal -->
    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Källdokument</h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <div class="pdf-viewer">
                <div class="pdf-controls">
                    <button id="prev-page" onclick="changePage(-1)">← Föregående</button>
                    <span>Sida <span id="page-num">1</span> av <span id="page-count">-</span></span>
                    <button id="next-page" onclick="changePage(1)">Nästa →</button>
                </div>
                <canvas id="pdf-canvas"></canvas>
                <div id="pdf-source-link" style="margin-top: 20px; text-align: center;">
                    <a href="#" target="_blank" id="pdf-url" style="color: var(--vm-blue); text-decoration: none; font-size: 12px; word-wrap: break-word;"></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ── PDF.js setup ──────────────────────────────── */
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let scale = 1.5;
        let highlightBox = null;
        let pdfSources = {};

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        async function loadPDFSources() {
            try {
                const response = await fetch('sources.yaml');
                const yamlText = await response.text();
                const data = jsyaml.load(yamlText);
                if (data.annual_reports) {
                    data.annual_reports.forEach(source => {
                        const filename = source.local_path.split('/').pop();
                        pdfSources[filename] = source.url;
                    });
                    renderPDFSourceList(data.annual_reports);
                }
            } catch (error) {
                console.error('Error loading PDF sources:', error);
            }
        }

        function renderPDFSourceList(reports) {
            const list = document.getElementById('pdf-source-list');
            if (!list) return;
            const sorted = [...reports].sort((a, b) => b.finance_period - a.finance_period);
            list.innerHTML = sorted.map(r => {
                return `<li>${r.finance_period} \u2013 <a href="${r.url}" target="_blank" rel="noopener" class="text-blue-700 hover:underline break-all">${r.url}</a></li>`;
            }).join('');
        }

        function showPDF(file, page, x, y, width, height, label) {
            const modal = document.getElementById('pdfModal');
            const title = document.getElementById('modal-title');
            const urlLink = document.getElementById('pdf-url');

            title.textContent = `Källdokument: ${file} – ${label}`;

            if (pdfSources[file]) {
                urlLink.href = pdfSources[file];
                urlLink.textContent = pdfSources[file];
                document.getElementById('pdf-source-link').style.display = 'block';
            } else {
                document.getElementById('pdf-source-link').style.display = 'none';
            }

            highlightBox = { pageNum: page, x: x, y: y, width: width, height: height };
            modal.style.display = 'block';
            loadPDF('data/annual_reports/' + file, page);
        }

        function closeModal() {
            document.getElementById('pdfModal').style.display = 'none';
            highlightBox = null;
            pdfDoc = null;
        }

        window.onclick = function(event) {
            if (event.target === document.getElementById('pdfModal')) {
                closeModal();
            }
        };

        async function loadPDF(pdfPath, targetPage) {
            try {
                pageNum = targetPage || 1;
                const loadingTask = pdfjsLib.getDocument(pdfPath);
                pdfDoc = await loadingTask.promise;
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                renderPage(pageNum);
            } catch (error) {
                console.error('Error loading PDF:', error);
            }
        }

        async function renderPage(num) {
            pageRendering = true;
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: scale });

            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            if (highlightBox && highlightBox.pageNum === num) {
                drawHighlight(highlightBox);
            }

            pageRendering = false;

            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }

            document.getElementById('page-num').textContent = num;
            updateButtons();
        }

        function drawHighlight(box) {
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 0, 0.4)';
            ctx.strokeStyle = 'rgb(255, 152, 0)';
            ctx.lineWidth = 3;
            ctx.fillRect(box.x, box.y, box.width, box.height);
            ctx.strokeRect(box.x, box.y, box.width, box.height);
            ctx.strokeStyle = 'rgba(102, 126, 234, 0.8)';
            ctx.lineWidth = 5;
            ctx.strokeRect(box.x - 2, box.y - 2, box.width + 4, box.height + 4);
            ctx.restore();
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function updateButtons() {
            document.getElementById('prev-page').disabled = (pageNum <= 1);
            document.getElementById('next-page').disabled = (pageNum >= pdfDoc.numPages);
        }

        function changePage(offset) {
            pageNum += offset;
            if (pageNum < 1) pageNum = 1;
            if (pageNum > pdfDoc.numPages) pageNum = pdfDoc.numPages;
            queueRenderPage(pageNum);
        }

        /* ── CSV data & table ──────────────────────────── */
        const CSV_URL = 'data/general_states.csv';
        const CAT_URL = 'data/general_categories.csv';

        let allRows = [];
        let categories = [];
        const defaultOn = new Set([0, 1, 2]); // Räkenskapsår, Ordförande, Vice ordförande

        async function loadData() {
            const [statesResp, catsResp] = await Promise.all([fetch(CSV_URL), fetch(CAT_URL)]);
            const statesText = await statesResp.text();
            const catsText = await catsResp.text();

            categories = catsText.trim().split('\n').slice(1).map(line => {
                const cols = line.split(',');
                return { id: parseInt(cols[0], 10), name: cols[1] };
            });

            allRows = statesText.trim().split('\n').slice(1).map(line => {
                const cols = line.split(',');
                return {
                    year: cols[0],
                    catId: parseInt(cols[1], 10),
                    value: cols[2],
                    file: cols[3],
                    page: parseInt(cols[4], 10),
                    x: parseFloat(cols[5]),
                    y: parseFloat(cols[6]),
                    width: parseFloat(cols[7]),
                    height: parseFloat(cols[8])
                };
            });

            renderFilters();
            renderTable();
        }

        function renderFilters() {
            const container = document.getElementById('column-filters');
            container.innerHTML = categories.map(cat => {
                const checked = defaultOn.has(cat.id) ? 'checked' : '';
                return `<label style="cursor:pointer; display:flex; align-items:center; gap:6px; font-size:14px; color:var(--vm-text);">
                    <input type="checkbox" value="${cat.id}" ${checked} onchange="renderTable()" style="accent-color:var(--vm-blue);">
                    ${cat.name}
                </label>`;
            }).join('');
        }

        function getActiveCatIds() {
            return [...document.querySelectorAll('#column-filters input:checked')].map(cb => parseInt(cb.value, 10));
        }

        function renderTable() {
            const activeCats = getActiveCatIds();

            // Header
            const headRow = document.getElementById('board-head-row');
            headRow.innerHTML = activeCats.map(catId => {
                const cat = categories.find(c => c.id === catId);
                return `<th>${cat ? cat.name : ''}</th>`;
            }).join('');

            // Group by year
            const byYear = {};
            for (const row of allRows) {
                if (!byYear[row.year]) byYear[row.year] = {};
                byYear[row.year][row.catId] = row;
            }

            const years = Object.keys(byYear).sort((a, b) => b - a);
            const tbody = document.getElementById('board-body');
            tbody.innerHTML = '';

            const prev = {};

            for (const year of years) {
                const d = byYear[year];
                const tr = document.createElement('tr');

                for (const catId of activeCats) {
                    const row = d[catId];
                    let display = row ? row.value : '—';

                    // For board members (cat 3), replace semicolons with line breaks
                    const isList = catId === 3;
                    const displayHtml = isList ? display.split(';').join('<br>') : display;

                    const td = document.createElement('td');

                    // Highlight changes (skip for first year seen)
                    if (prev[catId] !== undefined && display !== prev[catId]) {
                        td.classList.add('highlight-change');
                    }

                    if (row) {
                        const catName = (categories.find(c => c.id === catId) || {}).name || '';
                        const safeLabel = `${catName} ${year}`.replace(/'/g, "\\'");
                        td.innerHTML = `<span class="clickable-value" onclick="showPDF('${row.file}', ${row.page}, ${row.x}, ${row.y}, ${row.width}, ${row.height}, '${safeLabel}')">${displayHtml}</span>`;
                    } else {
                        td.textContent = '—';
                    }

                    tr.appendChild(td);
                    prev[catId] = display;
                }

                tbody.appendChild(tr);
            }
        }

        loadPDFSources().then(loadData);
    </script>
</body>
</html>

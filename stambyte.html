<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stambyte – Vision Myggan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 1rem; }
        @media (max-width: 640px) {
            body { font-size: 0.875rem; }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }
            p { font-size: 0.875rem; }
        }
        h1 { font-size: 2.25rem; }
        h2 { font-size: 1.5rem; }

        :root {
            --vm-blue: #1f3f95;
            --vm-blue-light: #7daef2;
            --vm-card: #e8edf6;
            --vm-text: #2f3d52;
            --vm-muted: #5e6b80;
            --vm-border: #c9d6ec;
        }

        .map-section {
            position: relative;
            width: 100vw;
            margin-left: calc(50% - 50vw);
            margin-right: calc(50% - 50vw);
        }
        .map-stack {
            position: relative;
            width: 100%;
            line-height: 0;
        }
        .map-stack img {
            display: block;
            width: 100%;
            height: auto;
        }
        .map-stack .map-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .map-stack .port-marker-layer {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }
        .map-stack .port-marker {
            position: absolute;
            width: 4.5vw;
            height: 4.5vw;
            margin-left: -2.25vw;
            margin-top: -2.25vw;
            border-radius: 50%;
            background: var(--port-bg, rgba(120, 120, 120, 0.4));
            border: 2px solid var(--port-color, #6b7280);
            box-shadow: 0 0 0 1px white inset;
            color: white;
            font-weight: 700;
            font-size: clamp(10px, 1.6vw, 22px);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        .part-color-swatch {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid currentColor;
            background: var(--port-bg);
            vertical-align: -3px;
            margin-right: 8px;
        }

        .opacity-switch {
            position: absolute;
            bottom: 16px;
            left: 16px;
            z-index: 10;
            display: inline-flex;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--vm-border);
            border-radius: 9999px;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        .opacity-switch button {
            border: none;
            background: transparent;
            color: var(--vm-text);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 9999px;
            cursor: pointer;
            line-height: 1;
        }
        .opacity-switch button.active {
            background: var(--vm-blue);
            color: white;
        }

        .port-marker .port-badge {
            position: absolute;
            top: -8%;
            right: -8%;
            width: 50%;
            height: 50%;
            min-width: 16px;
            min-height: 16px;
            max-width: 26px;
            max-height: 26px;
            border-radius: 50%;
            border: 2px solid white;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: clamp(9px, 1.3vw, 14px);
            line-height: 1;
            text-shadow: none;
            font-weight: 700;
            color: white;
            box-sizing: border-box;
        }
        .port-marker.state-in-progress .port-badge,
        .port-marker.state-completed .port-badge {
            display: flex;
        }
        .port-marker.state-in-progress .port-badge { background: #f59e0b; }
        .port-marker.state-completed   .port-badge { background: #16a34a; }

        .part-port {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .part-port-icon,
        .legend-icon {
            display: inline-flex;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 9px;
            font-weight: 700;
            line-height: 1;
        }
        .part-port-icon:empty { display: none; }
        .part-port-icon.state-in-progress,
        .legend-progress { background: #f59e0b; }
        .part-port-icon.state-completed,
        .legend-done     { background: #16a34a; }

        .time-slider-card {
            background: white;
            border: 1px solid var(--vm-border);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 14px 18px;
        }
        .time-slider-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .time-slider-row input[type="range"] {
            flex: 1;
            accent-color: var(--vm-blue);
        }
        .time-display {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--vm-blue);
            min-width: 7.5em;
            text-align: center;
        }
        .play-btn {
            background: var(--vm-blue);
            color: white;
            border: none;
            border-radius: 9999px;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }
        .play-btn:hover { background: #16327a; }
        .now-btn {
            background: white;
            color: var(--vm-blue);
            border: 1px solid var(--vm-border);
            border-radius: 9999px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            line-height: 1;
        }
        .now-btn:hover { background: var(--vm-card); }
        .time-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--vm-muted);
        }
        .time-legend .legend-icon {
            margin-right: 6px;
            vertical-align: -3px;
        }

        .slider-wrap {
            position: relative;
            flex: 1;
            padding-top: 18px;
            display: flex;
            align-items: center;
        }
        .slider-wrap input[type="range"] {
            flex: 1;
            margin: 0;
        }
        .today-tick {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 0;
            z-index: 1;
            pointer-events: none;
        }
        .today-tick::before {
            content: '';
            position: absolute;
            top: 18px;
            bottom: 0;
            left: 0;
            width: 2px;
            background: #ef4444;
            transform: translateX(-50%);
        }
        .today-tick-label {
            position: absolute;
            top: 0;
            left: 0;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700;
            color: white;
            background: #ef4444;
            padding: 1px 6px;
            border-radius: 4px;
            line-height: 1.2;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            pointer-events: auto;
            font-family: inherit;
        }
        .today-tick-label:hover { background: #dc2626; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
<header class="bg-blue-900 text-white sticky top-0 z-50 shadow">
<nav class="container mx-auto flex flex-wrap justify-center space-x-4 md:space-x-8 py-4">
<button onclick="location.href='annual_details.html#start'" class="hover:text-yellow-400 font-semibold">Start</button>
<button onclick="location.href='annual_details.html#vision'" class="hover:text-yellow-400 font-semibold">Vision</button>
<button onclick="location.href='annual_details.html#motioner'" class="hover:text-yellow-400 font-semibold">Motioner</button>
<button onclick="location.href='annual_details.html#forum'" class="hover:text-yellow-400 font-semibold">Forum</button>
</nav>
</header>

<div class="md:hidden bg-yellow-50 border-b border-yellow-200 text-yellow-800 text-center text-sm py-2 px-4">
  Sidan visas bäst på en större skärm, t.ex. dator eller surfplatta.
</div>

<main class="container mx-auto mt-8 p-4">
    <section class="block bg-gradient-to-r from-blue-50 via-white to-blue-50 p-6 rounded-2xl shadow-xl max-w-6xl mx-auto">
        <h1 class="text-blue-900 font-extrabold text-3xl mb-2 border-b-4 border-blue-300 pb-2">Stambyte</h1>
        <p class="text-gray-600 mb-6">Översikt av stambytet i BRF Sjötungan.</p>
    </section>

    <section class="map-section mt-8">
        <div class="map-stack">
            <img src="maps/sjotungan-aerial.png" alt="Sjötungan flygfoto">
            <img src="maps/sjotungan-linear.png" alt="Sjötungan karta" class="map-overlay" id="map-overlay">
            <div id="port-marker-layer" class="port-marker-layer"></div>
            <div class="opacity-switch" role="group" aria-label="Karta-opacitet">
                <button type="button" data-opacity="0">0%</button>
                <button type="button" data-opacity="0.5" class="active">50%</button>
                <button type="button" data-opacity="1">100%</button>
            </div>
        </div>
    </section>

    <section class="time-slider-section max-w-6xl mx-auto mt-6">
        <div class="time-slider-card">
            <div class="time-slider-row">
                <button id="play-button" type="button" class="play-btn" aria-label="Spela upp">▶</button>
                <button id="now-button" type="button" class="now-btn" aria-label="Återställ till idag">Idag</button>
                <span id="time-display" class="time-display">2026-05-01</span>
                <div class="slider-wrap">
                    <input id="time-slider" type="range" min="0" max="100" value="0" step="1" aria-label="Tidslinje">
                    <div id="today-tick" class="today-tick" aria-hidden="true">
                        <button id="today-tick-label" type="button" class="today-tick-label" aria-label="Hoppa till idag" title="Hoppa till idag">Idag</button>
                    </div>
                </div>
            </div>
            <div class="time-legend">
                <span><span class="legend-icon legend-progress">⚒</span>Pågående</span>
                <span><span class="legend-icon legend-done">✓</span>Klar</span>
            </div>
        </div>
    </section>

    <section class="parts-section mt-8 max-w-6xl mx-auto">
        <h2 class="text-blue-900 font-bold text-2xl mb-4">Etapper</h2>
        <div id="parts-list" class="space-y-4"></div>
    </section>
</main>

<script>
    (function () {
        const overlay = document.getElementById('map-overlay');
        const buttons = document.querySelectorAll('.opacity-switch button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                overlay.style.opacity = btn.dataset.opacity;
                buttons.forEach(b => b.classList.toggle('active', b === btn));
            });
        });
    })();

    (async function () {
        const layer = document.getElementById('port-marker-layer');
        const list = document.getElementById('parts-list');

        const palette = [
            '#a78bfa', // 1: light violet
            '#16a34a', // 2: green
            '#b85c47', // 3: brick
            '#eab308', // 4: yellow
            '#2563eb', // 5: blue
            '#0891b2', // 6: cyan
            '#ca8a04', // 7: amber
            '#db2777', // 8: pink
        ];
        const fallbackColor = '#6b7280';
        const isNumericKey = (k) => /^\d+$/.test(k);
        const colorByMain = new Map();
        const colorForMain = (key) =>
            (key != null && colorByMain.get(key)) || fallbackColor;
        const titleForMain = (k) => (isNumericKey(k) ? 'Huvuddel ' + k : k);
        const setMarkerColor = (el, hex) => {
            el.style.setProperty('--port-color', hex);
            el.style.setProperty('--port-bg', hexToRgba(hex, 0.45));
        };
        function hexToRgba(hex, alpha) {
            const m = hex.replace('#', '');
            const r = parseInt(m.slice(0, 2), 16);
            const g = parseInt(m.slice(2, 4), 16);
            const b = parseInt(m.slice(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        async function loadCsv(path) {
            try {
                const res = await fetch(path, { cache: 'no-store' });
                if (!res.ok) {
                    console.warn(path + ' fetch failed', res.status);
                    return null;
                }
                return await res.text();
            } catch (err) {
                console.warn(path + ' fetch error', err);
                return null;
            }
        }

        const [portsText, partsText, apartmentsText, progressText] = await Promise.all([
            loadCsv('maps/ports.csv'),
            loadCsv('data/stambyte/parts.csv'),
            loadCsv('data/apartments.csv'),
            loadCsv('data/stambyte/progress.csv'),
        ]);

        // port -> apartment count
        const apartmentsPerPort = new Map();
        if (apartmentsText) {
            apartmentsText.split(/\r?\n/).forEach((line, idx) => {
                if (!line.trim() || idx === 0) return;
                const [, portStr] = line.split(',');
                const port = parseInt(portStr, 10);
                if (!Number.isFinite(port)) return;
                apartmentsPerPort.set(port, (apartmentsPerPort.get(port) || 0) + 1);
            });
        }

        // port -> main_part (string key), and groups: main -> phase -> [ports]
        const portToMain = new Map();
        const groups = new Map();
        if (partsText) {
            partsText.split(/\r?\n/).forEach((line, idx) => {
                if (!line.trim() || idx === 0) return;
                const [portStr, mainStr, phaseStr] = line.split(',');
                const port = parseInt(portStr, 10);
                const main = (mainStr || '').trim();
                const phase = parseInt(phaseStr, 10);
                if (!main || !Number.isFinite(port) || !Number.isFinite(phase)) return;
                portToMain.set(port, main);
                if (!groups.has(main)) groups.set(main, new Map());
                const phaseMap = groups.get(main);
                if (!phaseMap.has(phase)) phaseMap.set(phase, []);
                phaseMap.get(phase).push(port);
            });
        }

        // assign palette: numeric mains use palette[n-1]; named (exceptional) mains use dark/black
        const namedPalette = ['#111827', '#374151'];
        const numericMains = [...groups.keys()]
            .filter(isNumericKey)
            .sort((a, b) => parseInt(a, 10) - parseInt(b, 10));
        const namedMains = [...groups.keys()].filter(k => !isNumericKey(k)).sort();
        numericMains.forEach(k => {
            const n = parseInt(k, 10);
            colorByMain.set(k, palette[n - 1] || fallbackColor);
        });
        namedMains.forEach((k, i) => {
            colorByMain.set(k, namedPalette[i] || namedPalette[namedPalette.length - 1]);
        });
        const sortedMains = [...namedMains, ...numericMains];

        // port -> sorted list of {date, event} (event 0 = started, 1 = completed)
        const portEvents = new Map();
        if (progressText) {
            progressText.split(/\r?\n/).forEach((line, idx) => {
                if (!line.trim() || idx === 0) return;
                const [dateStr, portStr, eventStr] = line.split(',');
                const port = parseInt(portStr, 10);
                const event = parseInt(eventStr, 10);
                const date = new Date(dateStr.trim());
                if (!Number.isFinite(port) || !Number.isFinite(event) || isNaN(date.getTime())) return;
                if (!portEvents.has(port)) portEvents.set(port, []);
                portEvents.get(port).push({ time: date.getTime(), event });
            });
            portEvents.forEach(arr => arr.sort((a, b) => a.time - b.time));
        }

        function portStateAt(port, t) {
            const events = portEvents.get(port);
            if (!events || !events.length) return 'idle';
            let state = 'idle';
            for (const e of events) {
                if (e.time <= t) state = e.event === 1 ? 'completed' : 'in-progress';
                else break;
            }
            return state;
        }

        const ICON_PROGRESS = '⚒';
        const ICON_DONE = '✓';

        const markers = []; // {el, badge, port}
        function applyMarkerState(m, state) {
            m.el.classList.remove('state-idle', 'state-in-progress', 'state-completed');
            m.el.classList.add('state-' + state);
            if (state === 'in-progress')      m.badge.textContent = ICON_PROGRESS;
            else if (state === 'completed')   m.badge.textContent = ICON_DONE;
            else                              m.badge.textContent = '';
        }

        if (layer && portsText) {
            portsText.split(/\r?\n/).forEach((line, idx) => {
                if (!line.trim() || idx === 0) return;
                const [numStr, xStr, yStr] = line.split(',');
                const num = parseInt(numStr, 10);
                const x = parseFloat(xStr), y = parseFloat(yStr);
                if (!Number.isFinite(num) || !Number.isFinite(x) || !Number.isFinite(y)) return;
                const el = document.createElement('div');
                el.className = 'port-marker';
                el.style.left = x + '%';
                el.style.top = y + '%';
                const color = colorForMain(portToMain.get(num));
                setMarkerColor(el, color);

                const numEl = document.createElement('span');
                numEl.className = 'port-num';
                numEl.textContent = num;
                el.appendChild(numEl);

                const badge = document.createElement('span');
                badge.className = 'port-badge';
                el.appendChild(badge);

                layer.appendChild(el);
                markers.push({ el, badge, port: num });
            });
        }

        // Parts list (rendered before slider so its icons can be updated by update())
        const partsListIcons = []; // {port, el}
        function applyPartsListIcon(el, state) {
            el.classList.remove('state-in-progress', 'state-completed');
            if (state === 'in-progress')    { el.classList.add('state-in-progress'); el.textContent = ICON_PROGRESS; }
            else if (state === 'completed') { el.classList.add('state-completed');   el.textContent = ICON_DONE; }
            else                            { el.textContent = ''; }
        }

        if (list && sortedMains.length) {
            sortedMains.forEach(main => {
                const color = colorForMain(main);
                const block = document.createElement('div');
                block.className = 'bg-white rounded-xl shadow p-4 border border-gray-200';

                const h3 = document.createElement('h3');
                h3.className = 'font-semibold text-lg mb-2';
                h3.style.color = color;

                const swatch = document.createElement('span');
                swatch.className = 'part-color-swatch';
                swatch.style.setProperty('--port-bg', hexToRgba(color, 0.45));
                h3.appendChild(swatch);
                h3.appendChild(document.createTextNode(titleForMain(main)));
                block.appendChild(h3);

                const ul = document.createElement('ul');
                ul.className = 'space-y-1 text-gray-800';
                const phases = [...groups.get(main).keys()].sort((a, b) => a - b);
                const singlePhase = phases.length === 1;
                phases.forEach(phase => {
                    const ports = groups.get(main).get(phase).sort((a, b) => a - b);
                    const apartmentCount = ports.reduce(
                        (sum, p) => sum + (apartmentsPerPort.get(p) || 0),
                        0
                    );
                    const li = document.createElement('li');
                    if (!singlePhase) {
                        const phaseSpan = document.createElement('span');
                        phaseSpan.className = 'font-medium';
                        phaseSpan.textContent = 'Fas ' + phase + ': ';
                        li.appendChild(phaseSpan);
                    }
                    li.appendChild(document.createTextNode('Portar '));
                    ports.forEach((p, i) => {
                        if (i > 0) li.appendChild(document.createTextNode(', '));
                        const portWrap = document.createElement('span');
                        portWrap.className = 'part-port';
                        portWrap.appendChild(document.createTextNode(p));
                        const iconEl = document.createElement('span');
                        iconEl.className = 'part-port-icon';
                        portWrap.appendChild(iconEl);
                        li.appendChild(portWrap);
                        partsListIcons.push({ port: p, el: iconEl });
                    });
                    li.appendChild(document.createTextNode(' '));
                    const aptSpan = document.createElement('span');
                    aptSpan.className = 'text-gray-500';
                    aptSpan.textContent = '(' + apartmentCount + ' lägenheter)';
                    li.appendChild(aptSpan);
                    ul.appendChild(li);
                });
                block.appendChild(ul);
                list.appendChild(block);
            });
        }

        // Time slider + playback
        const slider = document.getElementById('time-slider');
        const display = document.getElementById('time-display');
        const playBtn = document.getElementById('play-button');
        if (slider && display && playBtn) {
            const dayMs = 86400000;
            const startMs = Date.UTC(2018, 0, 1);
            const endMs = Date.UTC(2030, 11, 31);
            const totalDays = Math.round((endMs - startMs) / dayMs);
            const now = new Date();
            const todayMs = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
            const defaultIdx = Math.max(0, Math.min(totalDays, Math.round((todayMs - startMs) / dayMs)));

            slider.min = '0';
            slider.max = String(totalDays);
            slider.step = '1';
            slider.value = String(defaultIdx);

            const fmt = (ms) => new Date(ms).toISOString().slice(0, 10);

            function update() {
                const idx = parseInt(slider.value, 10);
                const t = startMs + idx * dayMs;
                display.textContent = fmt(t);
                markers.forEach(m => applyMarkerState(m, portStateAt(m.port, t)));
                partsListIcons.forEach(p => applyPartsListIcon(p.el, portStateAt(p.port, t)));
            }

            const todayTick = document.getElementById('today-tick');
            if (todayTick) {
                todayTick.style.left = (defaultIdx / totalDays * 100) + '%';
            }
            const todayTickLabel = document.getElementById('today-tick-label');

            slider.addEventListener('input', update);
            update();

            let timer = null;
            const stepDays = 7;
            const tickMs = 80;
            function setPlaying(on) {
                if (on) {
                    playBtn.textContent = '❚❚';
                    playBtn.setAttribute('aria-label', 'Pausa');
                    timer = setInterval(() => {
                        let v = parseInt(slider.value, 10) + stepDays;
                        if (v >= totalDays) {
                            v = totalDays;
                            slider.value = String(v);
                            update();
                            setPlaying(false);
                            return;
                        }
                        slider.value = String(v);
                        update();
                    }, tickMs);
                } else {
                    playBtn.textContent = '▶';
                    playBtn.setAttribute('aria-label', 'Spela upp');
                    if (timer) { clearInterval(timer); timer = null; }
                }
            }
            playBtn.addEventListener('click', () => setPlaying(!timer));

            function snapToToday() {
                if (timer) setPlaying(false);
                slider.value = String(defaultIdx);
                update();
            }

            const nowBtn = document.getElementById('now-button');
            if (nowBtn) nowBtn.addEventListener('click', snapToToday);
            if (todayTickLabel) todayTickLabel.addEventListener('click', snapToToday);
        }
    })();
</script>
</body>
</html>
